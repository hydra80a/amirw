name: دریافت فایل روت‌فایل سیستم

on:
  workflow_dispatch:

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: ایجاد پوشه و دانلود فایل
        run: |
          mkdir -p rootfs
          curl -L -o rootfs/rootfs.tar.xz \
          https://github.com/termux/proot-distro/releases/download/v4.34.2/almalinux-aarch64-pd-v4.34.2.tar.xz
      - name: commit و push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rootfs/
          git diff --quiet && git diff --staged --quiet || git commit -m "افزودن فایل روت‌فایل"
          git push