name: V2Ray Bridge to Arvan Worker

on:
  workflow_dispatch:

jobs:
  v2ray-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup V2Ray Server
        run: |
          curl -L https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip -o v2ray.zip
          unzip v2ray.zip -d v2ray
          cd v2ray
          cat > config.json << 'EOF'
          {
            "inbounds": [{
              "port": 10000,
              "protocol": "vmess",
              "settings": {
                "clients": [{
                  "id": "b831381d-6324-4d53-ad4f-8cda48b30811",
                  "alterId": 0
                }]
              }
            }],
            "outbounds": [{
              "protocol": "freedom",
              "settings": {}
            }]
          }
          EOF
          chmod +x v2ray
          ./v2ray run &

      - name: Install websocat
        run: |
          curl -L https://github.com/vi/websocat/releases/latest/download/websocat.x86_64-unknown-linux-musl -o websocat
          chmod +x websocat
          sudo mv websocat /usr/local/bin/

      - name: Connect to Arvan Worker (Backend WebSocket)
        env:
          WORKER_URL: ${{ secrets.ARVAN_WORKER_URL }}   # مثلاً https://sub.example.com
          CONNECT_PATH: "/connect"
        run: |
          # دستور اصلاح شده: --binary + tcp به جای tcp-listen
          websocat --binary "wss://${WORKER_URL}${CONNECT_PATH}" tcp:127.0.0.1:10000 &
          echo "Backend connected. Waiting for client..."
          sleep infinity
